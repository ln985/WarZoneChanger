name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write  # 添加这一行，授予写权限

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Generate Gradle Wrapper
        run: |
          mkdir -p /tmp/wgen && cd /tmp/wgen
          echo "rootProject.name = 'tmp'" > settings.gradle
          gradle wrapper --gradle-version 8.0
          mkdir -p $GITHUB_WORKSPACE/gradle/wrapper
          cp gradlew gradlew.bat $GITHUB_WORKSPACE/
          cp gradle/wrapper/* $GITHUB_WORKSPACE/gradle/wrapper/
          chmod +x $GITHUB_WORKSPACE/gradlew

      - name: Build Debug APK
        run: ./gradlew assembleDebug --no-daemon

      - name: Upload APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: WarZoneChanger
          path: app/build/outputs/apk/debug/app-debug.apk

      - name: Create Release
        if: success()
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.run_number }}
          name: Build ${{ github.run_number }}
          files: app/build/outputs/apk/debug/app-debug.apk
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
